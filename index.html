<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤقت الدراسة الاحترافي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --study: #00e5ff;
    --break: #69ff57;
    --bg: #060b14;
    --card: #0d1a2a;
    --border: #1a2f45;
    --text: #cce8ff;
    --muted: #4a7fa5;
    --accent: var(--study);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    transition: background 0.5s;
    overflow-x: hidden;
  }

  /* --- وضع التركيز والتدوير الكلي --- */
  body.fullscreen-active .app > *:not(#timerCard) { display: none; }
  body.fullscreen-active .app { height: 100vh; justify-content: center; padding: 0; max-width: 100%; margin: 0; }
  body.fullscreen-active #timerCard { width: 100%; height: 100%; border-radius: 0; border: none; display: flex; align-items: center; justify-content: center; }
  
  /* التدوير ليأخذ حجم الشاشة بالعرض */
  body.landscape-mode #timerCard {
    position: fixed; top: 0; left: 0;
    width: 100vh; height: 100vw;
    transform-origin: top left;
    transform: rotate(-90deg) translateX(-100vh);
    border-radius: 0; border: none; z-index: 9999;
  }
  
  #rotateBtn { display: none; }
  body.fullscreen-active #rotateBtn { display: flex; }

  .app { max-width:900px; margin:0 auto; padding:20px 16px; display:flex; flex-direction:column; gap:20px; }

  .timer-card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:40px 24px;
    position:relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
  }

  .phase-badge {
    display:inline-flex; align-items:center; gap:8px;
    background: rgba(0,229,255,0.1);
    border:1px solid rgba(0,229,255,0.3);
    border-radius:50px; padding:6px 16px;
    font-size:14px; font-weight:700; color:var(--study);
    margin-bottom:20px;
  }
  .phase-badge.break { color:var(--break); background:rgba(105,255,87,0.1); border-color:rgba(105,255,87,0.3); }

  .ring-wrap { position:relative; width:250px; height:250px; margin: 0 auto 20px; }
  svg { transform:rotate(-90deg); width:100%; height:100%; }
  .ring-bg { fill:none; stroke:rgba(255,255,255,0.05); stroke-width:8; }
  .ring-prog {
    fill:none; stroke:var(--accent); stroke-width:8;
    stroke-linecap:round; stroke-dasharray:628; stroke-dashoffset:0;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }

  .time-display { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
  .time-digits { font-family:'Orbitron'; font-size:54px; font-weight:900; color:white; }
  .time-label { font-size:12px; color:var(--muted); letter-spacing:2px; }

  .sessions-track { display:flex; justify-content:center; gap:6px; margin-bottom:25px; flex-wrap: wrap; }
  .session-pill { height:6px; background:rgba(255,255,255,0.1); border-radius:3px; flex-grow: 1; max-width: 40px; transition: 0.3s; }
  .session-pill.done-study { background: var(--study); box-shadow: 0 0 8px var(--study); }
  .session-pill.done-break { background: var(--break); box-shadow: 0 0 8px var(--break); }

  .controls { display:flex; justify-content:center; gap:12px; align-items: center; }
  .btn {
    border:none; cursor:pointer; border-radius:16px;
    width: 55px; height: 55px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; background: rgba(255,255,255,0.06);
    color: white; border: 1px solid var(--border); font-size: 20px;
  }
  .btn-primary { background: var(--study); color: #000; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 26px; }
  
  .stats-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; }
  @media(min-width:600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-box { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:15px; text-align:center; }
  .stat-val { font-family:'Orbitron'; font-size:22px; color:white; }
  .stat-lbl { font-size:11px; color:var(--muted); margin-top:4px; }

  .panel { background:var(--card); border:1px solid var(--border); border-radius:20px; overflow:hidden; }
  .panel-header { padding:16px 20px; cursor:pointer; display:flex; justify-content:space-between; background: rgba(255,255,255,0.02); font-weight: 700; }
  .panel-body { display:none; padding:20px; border-top: 1px solid var(--border); }
  .panel-body.open { display:block; }

  .session-row {
    display:grid; grid-template-columns: 40px 1fr 1fr 40px; gap:10px; 
    align-items:center; background:rgba(255,255,255,0.03);
    padding:10px; border-radius:12px; margin-bottom:8px;
  }
  .session-row select, .session-row input {
    background: #060b14; border: 1px solid var(--border); color: white; padding: 5px; border-radius: 6px; font-family: 'Cairo';
  }

  .btn-add { width: 100%; padding: 10px; background: rgba(0,229,255,0.1); border: 1px dashed var(--study); color: var(--study); border-radius: 12px; cursor: pointer; font-weight: 700; margin-bottom: 15px; }
  .apply-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--study); color: #000; font-weight: 900; cursor: pointer; }

  .opt-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; cursor:pointer; }
  .opt-card.active { border-color:var(--study); background:rgba(0,229,255,0.1); }
  .options-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap:10px; }
  
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--study); color: #000; padding: 8px 20px; border-radius: 50px;
    font-weight: bold; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 10000;
  }
  .toast.show { visibility: visible; opacity: 1; }

</style>
</head>
<body>

<div class="app">
  <div class="header" style="text-align: center;">
    <h1 style="font-family:'Orbitron'; color:var(--study); letter-spacing: 2px;">FOCUS MASTER</h1>
  </div>

  <div class="timer-card" id="timerCard">
    <div class="timer-inner" style="width:100%; display:flex; justify-content:center;">
      <div style="text-align:center;">
        <div class="phase-badge" id="phaseBadge">
          <span id="phaseLabel">وقت الدراسة 📚</span>
        </div>

        <div class="ring-wrap">
          <svg viewBox="0 0 220 220">
            <circle class="ring-bg" cx="110" cy="110" r="100"/>
            <circle class="ring-prog" id="ringProg" cx="110" cy="110" r="100"/>
          </svg>
          <div class="time-display">
            <div class="time-digits" id="timeDigits">25:00</div>
            <div class="time-label" id="timeLabel">الجلسة 1</div>
          </div>
        </div>

        <div class="sessions-track" id="sessionsTrack"></div>

        <div class="controls">
          <button class="btn" onclick="toggleFullscreen()">⛶</button>
          <button class="btn" id="rotateBtn" onclick="toggleLandscape()">📱</button>
          <button class="btn" onclick="confirmReset()">↺</button>
          <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">▶️</button>
          <button class="btn" onclick="skipPhase()">⏭️</button>
        </div>
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-val" id="statTotalSessions">0</div>
      <div class="stat-lbl">إجمالي الجلسات</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statStudy">0</div>
      <div class="stat-lbl">جلسات الدراسة</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statBreak">0</div>
      <div class="stat-lbl">جلسات الراحة</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statTime">0:00</div>
      <div class="stat-lbl">إجمالي الوقت</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header" onclick="togglePanel('soundPanel')">
      <span>🔔 صوت التنبيه</span> <span>▼</span>
    </div>
    <div class="panel-body" id="soundPanel">
      <p style="font-size:12px; color:var(--muted); margin-bottom:10px;">اضغط على النغمة لمعاينتها</p>
      <div class="options-grid">
        <div class="opt-card active" onclick="previewAndSelectAlert('bell.mp3', this)">🔔 جرس</div>
        <div class="opt-card" onclick="previewAndSelectAlert('siren.mp3', this)">🚨 صافرة</div>
      </div>
      <input type="file" id="alertUpload" hidden accept="audio/*" onchange="handleAlertUpload(event)">
      <button class="btn-add" style="margin-top:10px;" onclick="document.getElementById('alertUpload').click()">📁 رفع نغمة خاصة وسماعها</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header" onclick="togglePanel('customPanel')">
      <span>📋 الجدول المخصص</span> <span>▼</span>
    </div>
    <div class="panel-body" id="customPanel">
      <div id="customList"></div>
      <button class="btn-add" onclick="addCustomRow()">+ إضافة جلسة جديدة</button>
      <button class="apply-btn" onclick="confirmApplyCustom()">✓ تطبيق الجدول المخصص</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header" onclick="togglePanel('settingsPanel')">
      <span>⚙️ الإعدادات السريعة</span> <span>▼</span>
    </div>
    <div class="panel-body" id="settingsPanel">
      <div style="margin-bottom:15px;">
        <label>وقت الدراسة (دقيقة): <span id="sVal">25</span></label>
        <input type="range" id="sRange" min="1" max="90" value="25" style="width:100%" oninput="document.getElementById('sVal').textContent=this.value">
      </div>
      <div style="margin-bottom:15px;">
        <label>وقت الراحة (دقيقة): <span id="bVal">5</span></label>
        <input type="range" id="bRange" min="1" max="90" value="5" style="width:100%" oninput="document.getElementById('bVal').textContent=this.value">
      </div>
      <button class="apply-btn" onclick="confirmApplySettings()">✓ تطبيق الإعدادات</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">تم الحفظ</div>

<script>
// طلب إذن الإشعارات للعمل في الخلفية
if ("Notification" in window) {
  Notification.requestPermission();
}

let schedule = [];
let currentIdx = 0;
let timeLeft = 0;
let totalTime = 0;
let timerId = null;
let isRunning = false;
let stats = { study: 0, break: 0, totalSec: 0 };
let targetEndTime = 0; // لضمان دقة الوقت في الخلفية

// نغمة المعاينة
let audioPreviewer = new Audio();
let selectedAlertUrl = null;

let customSessions = [
  { type: 'study', mins: 25 },
  { type: 'break', mins: 5 },
  { type: 'study', mins: 25 },
  { type: 'break', mins: 5 }
];

// --- الحفظ التلقائي (LocalStorage) ---
function saveData() {
  const data = {
    schedule, currentIdx, timeLeft, totalTime, stats, customSessions, isRunning
  };
  localStorage.setItem('focusAppSavedState', JSON.stringify(data));
}

function loadSavedData() {
  const saved = localStorage.getItem('focusAppSavedState');
  if (saved) {
    const data = JSON.parse(saved);
    schedule = data.schedule;
    currentIdx = data.currentIdx;
    timeLeft = data.timeLeft;
    totalTime = data.totalTime;
    stats = data.stats;
    customSessions = data.customSessions || customSessions;
    
    // إذا كان يعمل قبل التحديث، نوقفه مؤقتاً كإجراء آمن
    isRunning = false; 
    
    document.getElementById('statTotalSessions').textContent = schedule.length;
    updateStats();
    updateDisplay();
    updateTheme(schedule[currentIdx]?.type || 'study');
    renderTrack();
  } else {
    init(); // التشغيل لأول مرة
  }
}

// --- التهيئة والتشغيل ---
function init() {
  schedule = customSessions.map((s, i) => ({
    ...s,
    label: s.type === 'study' ? `جلسة ${Math.ceil((i+1)/2)}` : `راحة ${Math.ceil((i+1)/2)}`
  }));
  document.getElementById('statTotalSessions').textContent = schedule.length;
  loadPhase(0);
  renderTrack();
  saveData();
}

function loadPhase(idx) {
  if (idx >= schedule.length) {
    showToast("تم إكمال الجدول! 🎉");
    isRunning = false;
    document.getElementById('startBtn').textContent = '▶️';
    sendNotification("انتهى الجدول", "تهانينا! لقد أتممت جميع الجلسات.");
    return;
  }
  const p = schedule[idx];
  timeLeft = p.mins * 60;
  totalTime = p.mins * 60;
  updateDisplay();
  updateTheme(p.type);
  saveData();
}

// --- المؤقت في الخلفية ---
function toggleTimer() {
  if (isRunning) pauseTimer();
  else startTimer();
}

function startTimer() {
  if (currentIdx >= schedule.length) return;
  isRunning = true;
  document.getElementById('startBtn').textContent = '⏸️';
  
  // نحدد وقت الانتهاء لضمان دقة العداد حتى خارج التطبيق
  targetEndTime = Date.now() + (timeLeft * 1000);
  
  timerId = setInterval(() => {
    // حساب الوقت المتبقي بناءً على ساعة النظام
    let now = Date.now();
    timeLeft = Math.round((targetEndTime - now) / 1000);

    if (timeLeft > 0) {
      stats.totalSec++; // ملاحظة: هذا الرقم قد يكون تقريبياً في الخلفية، لكن العداد نفسه دقيق جداً
      updateDisplay();
      updateStats();
      if(stats.totalSec % 5 === 0) saveData(); // حفظ كل 5 ثواني
    } else {
      completePhase();
    }
  }, 1000);
}

function pauseTimer() {
  isRunning = false;
  document.getElementById('startBtn').textContent = '▶️';
  clearInterval(timerId);
  saveData();
}

function completePhase() {
  pauseTimer();
  
  // تشغيل النغمة وإرسال إشعار
  if (selectedAlertUrl) {
      let alertSound = new Audio(selectedAlertUrl);
      alertSound.play();
  } else {
      // صوت افتراضي بسيط
      let ctx = new (window.AudioContext || window.webkitAudioContext)();
      let osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 1);
  }
  sendNotification("انتهى الوقت!", `انتهت ${schedule[currentIdx].label}`);

  if (schedule[currentIdx].type === 'study') stats.study++;
  else stats.break++;
  
  currentIdx++;
  loadPhase(currentIdx);
  renderTrack();
  if (currentIdx < schedule.length) startTimer(); // انتقال تلقائي
}

// إشعارات النظام
function sendNotification(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/3063/3063822.png" });
  }
}

// --- تحديث الواجهة ---
function updateDisplay() {
  if (timeLeft < 0) timeLeft = 0;
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timeDigits').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  if(schedule[currentIdx]) document.getElementById('timeLabel').textContent = schedule[currentIdx].label;
  
  const progress = totalTime > 0 ? (1 - (timeLeft / totalTime)) : 1;
  document.getElementById('ringProg').style.strokeDashoffset = 628 * (1 - progress);
}

function renderTrack() {
  const t = document.getElementById('sessionsTrack');
  t.innerHTML = '';
  schedule.forEach((s, i) => {
    const p = document.createElement('div');
    let statusClass = "";
    if (i < currentIdx) statusClass = (s.type === 'study') ? 'done-study' : 'done-break';
    p.className = `session-pill ${statusClass}`;
    if (i === currentIdx) p.style.boxShadow = "inset 0 0 5px white";
    t.appendChild(p);
  });
}

function updateStats() {
  document.getElementById('statStudy').textContent = stats.study;
  document.getElementById('statBreak').textContent = stats.break;
  const m = Math.floor(stats.totalSec / 60);
  const s = stats.totalSec % 60;
  document.getElementById('statTime').textContent = `${m}:${String(s).padStart(2, '0')}`;
}

// --- الإعدادات والجدول ---
function renderCustomList() {
  const container = document.getElementById('customList');
  container.innerHTML = '';
  customSessions.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'session-row';
    row.innerHTML = `
      <span>${i+1}</span>
      <select onchange="customSessions[${i}].type = this.value">
        <option value="study" ${s.type==='study'?'selected':''}>دراسة</option>
        <option value="break" ${s.type==='break'?'selected':''}>راحة</option>
      </select>
      <input type="number" value="${s.mins}" onchange="customSessions[${i}].mins = parseInt(this.value)">
      <button onclick="removeCustomRow(${i})" style="background:none; border:none; color:#ff4757; cursor:pointer;">✕</button>
    `;
    container.appendChild(row);
  });
}

function addCustomRow() {
  customSessions.push({ type: 'study', mins: 25 });
  renderCustomList();
}

function removeCustomRow(i) {
  customSessions.splice(i, 1);
  renderCustomList();
}

function confirmApplyCustom() {
  pauseTimer();
  stats = { study: 0, break: 0, totalSec: 0 };
  currentIdx = 0;
  init();
  updateStats();
  showToast("تم تطبيق الجدول الجديد");
}

function confirmApplySettings() {
  pauseTimer();
  const sm = parseInt(document.getElementById('sRange').value);
  const bm = parseInt(document.getElementById('bRange').value);
  customSessions = [
    {type:'study', mins:sm}, {type:'break', mins:bm},
    {type:'study', mins:sm}, {type:'break', mins:bm}
  ];
  stats = { study: 0, break: 0, totalSec: 0 };
  currentIdx = 0;
  init();
  updateStats();
  showToast("تم تحديث الإعدادات");
}

function confirmReset() {
  if (confirm("تصفير الجلسات والوقت والبدء من جديد؟")) {
    pauseTimer();
    stats = { study: 0, break: 0, totalSec: 0 };
    currentIdx = 0;
    updateStats();
    loadPhase(0);
    renderTrack();
    saveData();
    showToast("تم التصفير بنجاح");
  }
}

// --- الصوت والمعاينة ---
function previewAndSelectAlert(fileUrl, element) {
    // في بيئة العمل الحقيقية، ستحتاج روابط صحيحة لـ bell.mp3 وغيرها.
    // هنا سنستخدم أصوات تنبيه رقمية كبديل للمعاينة إذا لم تتوفر الروابط
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5);
    
    // تفعيل الزر المرئي
    document.querySelectorAll('#soundPanel .opt-card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    showToast("تم اختيار النغمة");
}

function handleAlertUpload(e) {
    const file = e.target.files[0];
    if(file) {
        selectedAlertUrl = URL.createObjectURL(file);
        audioPreviewer.src = selectedAlertUrl;
        audioPreviewer.play(); // تشغيل المعاينة
        
        document.querySelectorAll('#soundPanel .opt-card').forEach(c => c.classList.remove('active'));
        showToast("تم رفع النغمة وتعيينها!");
    }
}

// --- واجهة المستخدم العرضية (Fullscreen & Landscape) ---
function toggleFullscreen() { 
  document.body.classList.toggle('fullscreen-active'); 
  if(!document.body.classList.contains('fullscreen-active')) {
      document.body.classList.remove('landscape-mode'); // إرجاع الشاشة لوضعها الطبيعي عند الخروج من التركيز
  }
}
function toggleLandscape() { 
  document.body.classList.toggle('landscape-mode'); 
}
function togglePanel(id) { 
  document.getElementById(id).classList.toggle('open'); 
  if(id === 'customPanel') renderCustomList();
}
function updateTheme(type) {
  const isStudy = type === 'study';
  document.documentElement.style.setProperty('--accent', isStudy ? 'var(--study)' : 'var(--break)');
  document.getElementById('phaseBadge').className = `phase-badge ${isStudy ? '' : 'break'}`;
  document.getElementById('phaseLabel').textContent = isStudy ? 'وقت الدراسة 📚' : 'وقت الراحة ☕';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function skipPhase() { if(confirm("تخطي المرحلة؟")) completePhase(); }

// التشغيل عند تحميل الصفحة
window.onload = loadSavedData;
</script>
</body>
</html>
