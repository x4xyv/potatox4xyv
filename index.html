<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حسّاب — دفتر الحساب الذكي</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-logo">
      <svg width="56" height="56" viewBox="0 0 52 52" fill="none">
        <rect width="52" height="52" rx="14" fill="#F5C842"/>
        <path d="M14 20h24M14 26h16M14 32h20" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="38" cy="32" r="5" fill="#000"/>
        <path d="M36 32h4M38 30v4" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="splash-title">حسّاب</h1>
    <p class="splash-sub">دفتر الحساب الذكي بالتسميات</p>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app-hidden">

  <header class="header">
    <div class="header-start">
      <button class="sidebar-toggle" id="sidebarToggle" title="القائمة">
        <span></span><span></span><span></span>
      </button>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="14" fill="#F5C842"/>
          <path d="M14 20h24M14 26h16M14 32h20" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="38" cy="32" r="5" fill="#000"/>
          <path d="M36 32h4M38 30v4" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>حسّاب</span>
      </div>
    </div>
    <div class="header-end">
      <button class="icon-btn" id="themeToggleBtn" title="تبديل المظهر">
        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="icon-btn" id="exportBtn" title="تصدير">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="icon-btn" id="searchToggleBtn" title="بحث">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <!-- Google Auth Area -->
      <div id="authArea"></div>
    </div>
  </header>

  <div class="search-bar" id="searchBar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="ابحث في العمليات والتسميات..." />
    <button id="clearSearch">✕</button>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-label">الأقسام</span>
        <button class="btn-new-sec" id="newSectionBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          جديد
        </button>
      </div>
      <div class="sidebar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="sectionSearchInput" placeholder="ابحث عن قسم أو عنصر..." />
      </div>
      <div class="sections-list" id="sectionsList"></div>
      <div class="sidebar-foot">
        <div class="global-stats" id="globalStats"></div>
      </div>
    </aside>
    <main class="main" id="mainContent"></main>
  </div>
</div>

<!-- ══ MODALS — all start with modal-hidden ══ -->

<div class="overlay modal-hidden" id="sectionModal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="sectionModalTitle">قسم جديد</h3>
      <button class="modal-close" data-close="sectionModal">✕</button>
    </div>
    <label class="field-label">اسم القسم</label>
    <input type="text" class="field-input" id="sectionNameInput" placeholder="مثال: السوق الأسبوعي، مصاريف العمل..." maxlength="40" />
    <label class="field-label" style="margin-top:14px">الوحدة (اختياري)</label>
    <input type="text" class="field-input" id="sectionUnitInput" placeholder="مثال: ريال، دولار، كغ..." maxlength="10" />
    <label class="field-label" style="margin-top:14px">اللون</label>
    <div class="color-grid" id="colorGrid"></div>
    <label class="field-label" style="margin-top:14px">الأيقونة</label>
    <div class="icon-grid" id="iconGrid"></div>
    <div class="modal-actions">
      <button class="btn-ghost" data-close="sectionModal">إلغاء</button>
      <button class="btn-primary" id="saveSectionBtn">حفظ القسم</button>
    </div>
  </div>
</div>

<div class="overlay modal-hidden" id="editModal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3>تعديل العملية</h3>
      <button class="modal-close" data-close="editModal">✕</button>
    </div>
    <label class="field-label">العملية</label>
    <select class="field-input" id="editOp">
      <option value="+">+ جمع</option>
      <option value="-">− طرح</option>
      <option value="×">× ضرب</option>
      <option value="÷">÷ قسمة</option>
    </select>
    <label class="field-label" style="margin-top:14px">الرقم</label>
    <input type="number" class="field-input" id="editNum" />
    <label class="field-label" style="margin-top:14px">التسمية</label>
    <input type="text" class="field-input" id="editLabel" placeholder="اسم البند..." maxlength="40" />
    <label class="field-label" style="margin-top:14px">ملاحظة (اختياري)</label>
    <input type="text" class="field-input" id="editNote" placeholder="ملاحظة إضافية..." maxlength="80" />
    <div class="modal-actions">
      <button class="btn-ghost" data-close="editModal">إلغاء</button>
      <button class="btn-primary" id="saveEditBtn">حفظ التعديل</button>
    </div>
  </div>
</div>

<div class="overlay modal-hidden" id="confirmModal">
  <div class="modal modal-sm" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="confirmTitle">تأكيد الحذف</h3>
      <button class="modal-close" data-close="confirmModal">✕</button>
    </div>
    <p class="confirm-text" id="confirmText"></p>
    <div class="modal-actions">
      <button class="btn-ghost" data-close="confirmModal">إلغاء</button>
      <button class="btn-danger" id="confirmOkBtn">حذف</button>
    </div>
  </div>
</div>

<div class="overlay modal-hidden" id="exportModal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3>تصدير البيانات</h3>
      <button class="modal-close" data-close="exportModal">✕</button>
    </div>
    <p class="confirm-text">اختر صيغة التصدير للقسم الحالي:</p>
    <div class="export-options" id="exportOptions"></div>
    <div class="modal-actions">
      <button class="btn-ghost" data-close="exportModal">إلغاء</button>
    </div>
  </div>
</div>


<div class="overlay modal-hidden" id="authModal">
  <div class="modal auth-modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="authModalTitle">تسجيل الدخول</h3>
      <button class="modal-close" data-close="authModal">✕</button>
    </div>
    <div class="auth-mode-switch">
      <button type="button" class="auth-mode-btn active" id="authLoginTab">دخول</button>
      <button type="button" class="auth-mode-btn" id="authRegisterTab">إنشاء حساب</button>
    </div>
    <div id="authForm" data-mode="login">
      <label class="field-label">اسم المستخدم</label>
      <input type="text" class="field-input" id="authUsername" placeholder="مثال: ahmad_92" maxlength="30" autocomplete="username" />
      <label class="field-label" style="margin-top:14px">اسم العرض (اختياري)</label>
      <input type="text" class="field-input" id="authDisplayName" placeholder="الاسم الذي يظهر داخل التطبيق" maxlength="30" autocomplete="name" />
      <label class="field-label" style="margin-top:14px">الرمز الخاص</label>
      <input type="password" class="field-input" id="authCode" placeholder="أدخل الرمز" maxlength="64" autocomplete="current-password" />
      <div id="authConfirmRow" style="display:none">
        <label class="field-label" style="margin-top:14px">تأكيد الرمز</label>
        <input type="password" class="field-input" id="authCodeConfirm" placeholder="أعد كتابة الرمز" maxlength="64" autocomplete="new-password" />
      </div>
      <div class="auth-help">
        يتم حفظ بيانات هذا الحساب محليًا داخل الجهاز، وتُحمَّل تلقائيًا عند تسجيل الدخول بنفس الاسم والرمز.
      </div>
      <div class="auth-switch-row">
        <span id="authSwitchText">لا تملك حسابًا بعد؟</span>
        <button type="button" id="authSwitchBtn" class="auth-switch-btn">إنشاء حساب</button>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" data-close="authModal">إلغاء</button>
        <button class="btn-primary" id="authSubmitBtn">دخول</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
